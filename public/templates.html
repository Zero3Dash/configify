<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>configify · Templates</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --sb: 76px; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #f8fafc; color: #0f172a;
    padding-left: var(--sb); min-height: 100vh;
  }

  /* ── Sidebar ── */
  .sidebar {
    position: fixed; left: 0; top: 0; bottom: 0; width: var(--sb);
    background: #0f172a; display: flex; flex-direction: column;
    align-items: center; z-index: 100; padding: 10px 0;
    border-right: 1px solid #1e293b;
  }
  .sb-brand { font-size: 1.5rem; color: #38bdf8; padding: 8px 0 12px; font-weight: 800; letter-spacing: -1px; user-select: none; }
  .sb-nav   { display: flex; flex-direction: column; gap: 3px; width: 100%; padding: 0 7px; flex: 1; }
  .sb-item  {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 9px 4px 7px; border-radius: 10px; text-decoration: none;
    color: #64748b; gap: 4px; border: none; background: none; width: 100%;
    cursor: pointer; transition: background 0.15s, color 0.15s; min-height: 56px;
  }
  .sb-item:hover  { background: #1e293b; color: #cbd5e1; }
  .sb-item.active { background: #1d4ed8; color: white; }
  .sb-icon  { font-size: 1.3rem; line-height: 1; }
  .sb-label { font-size: 0.6rem; font-weight: 600; text-align: center; letter-spacing: 0.03em; text-transform: uppercase; }
  .sb-divider { width: 44px; height: 1px; background: #1e293b; margin: 6px auto; }
  .sb-footer  { width: 100%; padding: 0 7px; display: flex; flex-direction: column; gap: 3px; }
  .sb-user    { font-size: 0.6rem; color: #334155; text-align: center; padding: 4px 2px; word-break: break-all; }
  .hidden { display: none !important; }

  /* ── Layout ── */
  .main { max-width: 760px; margin: 0 auto; padding: 1.5rem; }
  .page-header { padding-bottom: 1.25rem; }
  .page-header h1 { font-size: 1.4rem; font-weight: 700; }
  .page-header p  { font-size: 0.85rem; color: #64748b; margin-top: 3px; }

  /* ── Cards ── */
  .card {
    background: white; border-radius: 14px; padding: 1.5rem;
    box-shadow: 0 1px 6px rgba(0,0,0,0.07); border: 1px solid #e2e8f0;
  }
  .card + .card { margin-top: 1.25rem; }
  .card-title {
    font-size: 0.75rem; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.08em; color: #94a3b8; margin-bottom: 1rem;
  }

  /* ── Form ── */
  .field { margin-bottom: 1rem; }
  .field:last-child { margin-bottom: 0; }
  .field label {
    display: block; font-size: 0.8rem; font-weight: 600;
    color: #374151; margin-bottom: 0.3rem;
  }
  .field label .hint {
    font-weight: 400; color: #94a3b8; font-size: 0.75rem; margin-left: 0.4rem;
  }
  input[type="text"], textarea {
    width: 100%; padding: 0.65rem 0.85rem; border: 1px solid #d1d5db; border-radius: 8px;
    font-size: 0.9rem; outline: none; background: white; color: #0f172a;
    transition: border-color 0.15s;
  }
  input[type="text"]:focus, textarea:focus {
    border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37,99,235,0.1);
  }
  textarea {
    font-family: 'Fira Code', 'Cascadia Code', monospace;
    font-size: 0.82rem; min-height: 220px; resize: vertical; line-height: 1.65;
  }

  /* ── Variable chips ── */
  .var-preview {
    display: flex; flex-wrap: wrap; gap: 5px; min-height: 28px;
    margin-top: 0.5rem; align-items: center;
  }
  .var-chip {
    background: #dbeafe; color: #1d4ed8; padding: 0.18rem 0.55rem;
    border-radius: 5px; font-size: 0.72rem; font-weight: 600;
    font-family: 'Fira Code', monospace;
  }
  .var-none { font-size: 0.78rem; color: #94a3b8; }

  /* ── Char count ── */
  .meta-row { display: flex; justify-content: space-between; align-items: center; margin-top: 0.4rem; }
  .char-count { font-size: 0.72rem; color: #94a3b8; }

  /* ── Action row ── */
  .action-row { display: flex; gap: 0.6rem; justify-content: flex-end; margin-top: 1.25rem; }

  /* ── Buttons ── */
  button { border: none; cursor: pointer; font-weight: 500; border-radius: 7px; transition: all 0.15s; }
  .btn   { padding: 0.55rem 1.1rem; font-size: 0.85rem; }
  .btn-primary   { background: #2563eb; color: white; }
  .btn-primary:hover   { background: #1d4ed8; }
  .btn-secondary { background: #f1f5f9; color: #475569; border: 1px solid #e2e8f0; }
  .btn-secondary:hover { background: #e2e8f0; }
  .btn-sm { padding: 0.28rem 0.65rem; font-size: 0.76rem; }
  .btn-danger { background: #fee2e2; color: #dc2626; border: 1px solid #fecaca; }
  .btn-danger:hover { background: #fecaca; }

  /* ── Existing templates list ── */
  .tpl-list { display: flex; flex-direction: column; gap: 0.5rem; }
  .tpl-row {
    display: flex; align-items: center; gap: 0.75rem;
    padding: 0.65rem 0.85rem; background: #f8fafc;
    border: 1px solid #e2e8f0; border-radius: 9px;
  }
  .tpl-row:hover { background: #f1f5f9; }
  .tpl-name { font-weight: 600; font-size: 0.875rem; flex: 1; min-width: 0; }
  .tpl-preview-text {
    font-family: 'Fira Code', monospace; font-size: 0.72rem; color: #94a3b8;
    flex: 2; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; min-width: 0;
  }
  .tpl-vars { font-size: 0.72rem; color: #64748b; white-space: nowrap; }
  .tpl-actions { display: flex; gap: 0.4rem; flex-shrink: 0; }
  .empty-note { text-align: center; padding: 1.5rem; color: #94a3b8; font-size: 0.85rem; }

  /* ── Modal ── */
  .modal-backdrop {
    position: fixed; inset: 0; background: rgba(0,0,0,0.45);
    display: none; align-items: center; justify-content: center; z-index: 200;
  }
  .modal-backdrop.open { display: flex; }
  .modal {
    background: white; border-radius: 14px; padding: 1.5rem;
    width: 100%; max-width: 620px; max-height: 90vh; overflow-y: auto;
    box-shadow: 0 20px 50px rgba(0,0,0,0.25);
  }
  .modal h3 { font-size: 1rem; font-weight: 700; margin-bottom: 1.1rem; }
  .modal label {
    display: block; font-size: 0.8rem; font-weight: 600;
    color: #374151; margin-bottom: 0.3rem; margin-top: 0.85rem;
  }
  .modal label:first-of-type { margin-top: 0; }
  .modal input[type="text"] { font-size: 0.875rem; }
  .modal textarea {
    min-height: 260px; font-family: 'Fira Code', 'Cascadia Code', monospace;
    font-size: 0.8rem; line-height: 1.65; resize: vertical;
  }
  .modal-meta { display: flex; justify-content: space-between; align-items: center; margin-top: 0.4rem; }
  .modal-footer { display: flex; gap: 0.5rem; justify-content: flex-end; margin-top: 1.2rem; }

  /* ── Toast ── */
  #toast {
    position: fixed; bottom: 1.5rem; right: 1.5rem; background: #166534;
    color: white; padding: 0.65rem 1rem; border-radius: 8px; font-size: 0.83rem;
    display: none; z-index: 300; box-shadow: 0 4px 14px rgba(0,0,0,0.2);
  }
</style>
</head>
<body>

<aside class="sidebar">
  <div class="sb-brand">cf</div>
  <nav class="sb-nav">
    <a href="/" class="sb-item">
      <span class="sb-icon">📋</span>
      <span class="sb-label">Use</span>
    </a>
    <a href="/templates.html" class="sb-item active">
      <span class="sb-icon">📂</span>
      <span class="sb-label">Templates</span>
    </a>
    <a href="/devices.html" class="sb-item">
      <span class="sb-icon">🖥️</span>
      <span class="sb-label">Devices</span>
    </a>
    <a href="/admin.html" class="sb-item hidden" id="admin-link">
      <span class="sb-icon">⚙️</span>
      <span class="sb-label">Admin</span>
    </a>
  </nav>
  <div class="sb-divider"></div>
  <div class="sb-footer">
    <div class="sb-user" id="user-badge">…</div>
    <button class="sb-item" onclick="doLogout()">
      <span class="sb-icon">↩️</span>
      <span class="sb-label">Sign out</span>
    </button>
  </div>
</aside>

<main class="main">
  <div class="page-header">
    <h1>Create Template</h1>
    <p>Name your template, write the body, and use <code style="background:#f1f5f9;padding:1px 6px;border-radius:4px;font-size:0.82em">{{Variable Name}}</code> for placeholders.</p>
  </div>

  <!-- ── Create form ── -->
  <div class="card">
    <div class="card-title">New template</div>

    <div class="field">
      <label for="t-name">Template name</label>
      <input type="text" id="t-name" placeholder="e.g. Router interface config" maxlength="120" />
    </div>

    <div class="field">
      <label for="t-body">
        Template body
        <span class="hint">— wrap placeholders in double curly braces</span>
      </label>
      <textarea id="t-body"
        placeholder="interface {{Interface}}&#10; ip address {{IP Address}} {{Subnet Mask}}&#10; no shutdown&#10;ip route 0.0.0.0 0.0.0.0 {{Default Gateway}}"
        oninput="onBodyInput()"></textarea>
      <div class="meta-row">
        <div class="var-preview" id="var-preview">
          <span class="var-none">No variables detected yet</span>
        </div>
        <span class="char-count" id="char-count">0 chars</span>
      </div>
    </div>

    <div class="action-row">
      <button class="btn btn-secondary" onclick="loadExample()">↺ Load example</button>
      <button class="btn btn-primary" onclick="saveTemplate()">💾 Save template</button>
    </div>
  </div>

  <!-- ── Existing templates ── -->
  <div class="card">
    <div class="card-title" style="display:flex;justify-content:space-between;align-items:center">
      <span>Saved templates</span>
      <button class="btn btn-secondary btn-sm" onclick="loadList()">🔄 Refresh</button>
    </div>
    <div class="tpl-list" id="tpl-list">
      <div class="empty-note">Loading…</div>
    </div>
  </div>
</main>

<!-- ── Edit modal ── -->
<div class="modal-backdrop" id="edit-modal">
  <div class="modal">
    <h3>Edit template</h3>
    <input type="hidden" id="e-id" />

    <label for="e-name">Template name</label>
    <input type="text" id="e-name" maxlength="120" />

    <label for="e-body">
      Template body
      <span style="font-weight:400;color:#94a3b8;font-size:0.75rem;margin-left:0.4rem">— {{Variable Name}} for placeholders</span>
    </label>
    <textarea id="e-body" oninput="onEditBodyInput()"></textarea>
    <div class="modal-meta">
      <div class="var-preview" id="e-var-preview">
        <span class="var-none">No variables detected yet</span>
      </div>
      <span class="char-count" id="e-char-count">0 chars</span>
    </div>

    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeEditModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveEdit()">💾 Save changes</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
'use strict';

// ── Module-level template store — populated by loadList() ─────
// Storing templates here lets openEditModal look up data by ID instead of
// embedding raw content in onclick attributes (which broke when template
// bodies contained quotes, backticks, or other special characters).
let allTemplates = [];

const EXAMPLE_NAME = 'Router interface config';
const EXAMPLE_BODY = `interface {{Interface}}\n ip address {{IP Address}} {{Subnet Mask}}\n no shutdown\nip route 0.0.0.0 0.0.0.0 {{Default Gateway}}`;

// ── Boot ──────────────────────────────────────────────────────
(async () => {
  try {
    const me = await api('/auth/me');
    document.getElementById('user-badge').textContent = me.username;
    if (me.role === 'admin') document.getElementById('admin-link').classList.remove('hidden');
  } catch (_) {}
  await loadList();
})();

// ── Live body input (create form) ─────────────────────────────
function onBodyInput() {
  const text = document.getElementById('t-body').value;
  document.getElementById('char-count').textContent = `${text.length} chars`;
  updateVarPreview(text, 'var-preview');
}

// ── Live body input (edit modal) ──────────────────────────────
function onEditBodyInput() {
  const text = document.getElementById('e-body').value;
  document.getElementById('e-char-count').textContent = `${text.length} chars`;
  updateVarPreview(text, 'e-var-preview');
}

function updateVarPreview(text, previewId) {
  const vars    = extractVars(text);
  const preview = document.getElementById(previewId);
  preview.innerHTML = vars.length === 0
    ? '<span class="var-none">No variables detected yet</span>'
    : vars.map(v => `<span class="var-chip">{{${esc(v)}}}</span>`).join('');
}

// ── Save (create) ─────────────────────────────────────────────
async function saveTemplate() {
  const name = document.getElementById('t-name').value.trim();
  const body = document.getElementById('t-body').value.trim();
  if (!name) return toast('Enter a template name', true);
  if (!body) return toast('Template body is empty', true);

  try {
    await api('/api/templates', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, template_text: body }),
    });
    document.getElementById('t-name').value = '';
    document.getElementById('t-body').value = '';
    document.getElementById('char-count').textContent = '0 chars';
    document.getElementById('var-preview').innerHTML = '<span class="var-none">No variables detected yet</span>';
    toast('Template saved');
    await loadList();
  } catch (e) {
    toast(e.message || 'Save failed', true);
  }
}

// ── Load example ──────────────────────────────────────────────
function loadExample() {
  const nameEl = document.getElementById('t-name');
  const bodyEl = document.getElementById('t-body');
  if (!nameEl.value.trim()) nameEl.value = EXAMPLE_NAME;
  bodyEl.value = EXAMPLE_BODY;
  onBodyInput();
  bodyEl.focus();
}

// ── Existing templates list ────────────────────────────────────
async function loadList() {
  const container = document.getElementById('tpl-list');
  try {
    const templates = await api('/api/templates');

    // Keep a module-level copy so openEditModal can look up by ID safely.
    allTemplates = templates;

    if (!templates.length) {
      container.innerHTML = '<div class="empty-note">No templates yet — create your first one above.</div>';
      return;
    }
    const sorted = [...templates].sort((a, b) => a.name.localeCompare(b.name));
    container.innerHTML = sorted.map(t => {
      const vars      = extractVars(t.template_text || '');
      const firstLine = (t.template_text || '').split('\n')[0];
      const varLabel  = vars.length === 0 ? 'no variables'
                      : vars.length === 1 ? '1 variable'
                      : `${vars.length} variables`;
      // Pass only the template_id in the onclick — no raw content in attributes.
      return `
        <div class="tpl-row" id="row-${t.template_id}">
          <span class="tpl-name">${esc(t.name)}</span>
          <span class="tpl-preview-text">${esc(firstLine)}</span>
          <span class="tpl-vars">${varLabel}</span>
          <div class="tpl-actions">
            <a href="/?template=${encodeURIComponent(t.template_id)}">
              <button class="btn btn-secondary btn-sm">▶ Use</button>
            </a>
            <button class="btn btn-secondary btn-sm"
              onclick="openEditModal('${esc(t.template_id)}')">
              ✏️ Edit
            </button>
            <button class="btn btn-danger btn-sm"
              onclick="deleteTemplate('${esc(t.template_id)}', '${esc(t.name).replace(/'/g, "\\'")}')">
              Delete
            </button>
          </div>
        </div>`;
    }).join('');
  } catch (_) {
    container.innerHTML = '<div class="empty-note" style="color:#dc2626">Failed to load templates.</div>';
  }
}

// ── Edit modal ────────────────────────────────────────────────
// Accepts only a template_id and retrieves the full record from allTemplates.
// Previously the name and body were passed directly as onclick arguments, which
// caused them to leak into the create form when template content contained
// characters that broke the HTML attribute boundary.
function openEditModal(templateId) {
  const t = allTemplates.find(x => x.template_id === templateId);
  if (!t) {
    toast('Could not find template — try refreshing the list', true);
    return;
  }

  document.getElementById('e-id').value   = t.template_id;
  document.getElementById('e-name').value = t.name;
  document.getElementById('e-body').value = t.template_text || '';

  const text = t.template_text || '';
  document.getElementById('e-char-count').textContent = `${text.length} chars`;
  updateVarPreview(text, 'e-var-preview');

  document.getElementById('edit-modal').classList.add('open');
  setTimeout(() => document.getElementById('e-name').focus(), 50);
}

function closeEditModal() {
  document.getElementById('edit-modal').classList.remove('open');
}

// Saves edits — shows a confirmation dialog describing what will change
// before committing to the server.
async function saveEdit() {
  const id   = document.getElementById('e-id').value;
  const name = document.getElementById('e-name').value.trim();
  const body = document.getElementById('e-body').value.trim();
  if (!name) return toast('Template name is required', true);
  if (!body) return toast('Template body is empty', true);

  const original    = allTemplates.find(x => x.template_id === id);
  const nameChanged = original && original.name          !== name;
  const bodyChanged = original && original.template_text !== body;

  if (!nameChanged && !bodyChanged) {
    toast('No changes to save');
    closeEditModal();
    return;
  }

  const changes = [];
  if (nameChanged) changes.push(`rename to "${name}"`);
  if (bodyChanged) changes.push('update the template body');

  const confirmed = confirm(
    `Save changes to "${original ? original.name : name}"?\n\n` +
    `This will ${changes.join(' and ')}.`
  );
  if (!confirmed) return;

  try {
    await api(`/api/templates/${id}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, template_text: body }),
    });
    closeEditModal();
    toast('Template updated');
    await loadList();
  } catch (e) {
    toast(e.message || 'Update failed', true);
  }
}

// Close modal on backdrop click
document.getElementById('edit-modal').addEventListener('click', (e) => {
  if (e.target === e.currentTarget) closeEditModal();
});

// ── Delete ────────────────────────────────────────────────────
async function deleteTemplate(id, name) {
  if (!confirm(`Delete "${name}"? This cannot be undone.`)) return;
  try {
    await api(`/api/templates/${id}`, { method: 'DELETE' });
    toast('Template deleted');
    await loadList();
  } catch (_) {
    toast('Delete failed', true);
  }
}

// ── Helpers ───────────────────────────────────────────────────
function extractVars(text) {
  const out = [], re = /{{\s*([^}]+?)\s*}}/g; let m;
  while ((m = re.exec(text)) !== null) {
    const v = m[1].trim();
    if (!out.includes(v)) out.push(v);
  }
  return out;
}
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
async function api(url, opts) {
  const r = await fetch(url, opts);
  const d = await r.json().catch(() => ({}));
  if (!r.ok) throw new Error(d.error || r.statusText);
  return d;
}
function toast(msg, err = false) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.style.background = err ? '#7f1d1d' : '#166534';
  el.style.display = 'block';
  setTimeout(() => el.style.display = 'none', 3200);
}
async function doLogout() {
  await fetch('/auth/logout', { method: 'POST' });
  location.href = '/login.html';
}
</script>
</body>
</html>
